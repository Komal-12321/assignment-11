<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Attendance System</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      text-align: center;
      box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #4facfe;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #007bff;
    }

    ul {
      text-align: left;
      margin-top: 15px;
      max-height: 150px;
      overflow-y: auto;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>📋 Attendance System</h2>

  <button onclick="markAttendance()">Mark Present</button>

  <p id="status"></p>

  <h4>Attendance History</h4>
  <ul id="history"></ul>
</div>

<script>
  function markAttendance() {
    const now = new Date().toLocaleString();

    let records = JSON.parse(localStorage.getItem("attendance")) || [];
    records.push(now);

    localStorage.setItem("attendance", JSON.stringify(records));

    document.getElementById("status").innerHTML =
      "✅ Marked at " + now;

    loadHistory();
  }

  function loadHistory() {
    const records = JSON.parse(localStorage.getItem("attendance")) || [];
    const list = document.getElementById("history");

    list.innerHTML = "";

    records.slice().reverse().forEach(item => {
      const li = document.createElement("li");
      li.textContent = item;
      list.appendChild(li);
    });
  }

  // Load on start
  loadHistory();
</script>

</body>
</html>
