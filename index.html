<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Attendance System</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      text-align: center;
      box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 10px;
      color: #333;
    }

    p {
      color: #555;
      margin-bottom: 20px;
      font-size: 16px;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #4facfe;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #007bff;
      transform: scale(1.05);
    }

    #status {
      margin-top: 20px;
      font-weight: bold;
      color: green;
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>📋 Attendance System</h1>
    <p id="status">Mark your attendance</p>

    <button onclick="mark()">Mark Present</button>

    <footer>Deployed using AWS CI/CD 🚀</footer>
  </div>

  <script>
    function mark() {
      document.getElementById("status").innerHTML =
        "✅ Attendance Marked Successfully!";
    }
  </script>

</body>
</html>
